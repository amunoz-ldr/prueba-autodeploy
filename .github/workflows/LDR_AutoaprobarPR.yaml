name: "LDR: Autoaprobar Pull Request"

on:
  workflow_call:
    inputs:
      prNumber:
        description: Numero de Pull Request a autoaprobar
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  Auto-aprobacion:
    name: Auto-aprobar Pull Request
    runs-on: ubuntu-latest
    steps:
      - name: Auto-aprobar el pull request
        uses: hmarr/auto-approve-action@v3
        with:
          review-message: "Autoaprobado"
          pull-request-number: ${{ inputs.prNumber }}
          github-token: ${{ secrets.GHTOKEN_AUTO }}

      - name: Merge Pull Request
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GHTOKEN_AUTO }}
        run: |
          pr_number="${{ inputs.prNumber }}"
          for attempt in 1 2 3 4 5 6; do
          pr_info=$(gh pr view "$pr_number" \
            --repo ${{ github.repository }} \
            --json state,mergeStateStatus,reviewDecision,isDraft)
          state=$(echo "$pr_info" | jq -r '.state')
          merge_state=$(echo "$pr_info" | jq -r '.mergeStateStatus')
          review_decision=$(echo "$pr_info" | jq -r '.reviewDecision')
          is_draft=$(echo "$pr_info" | jq -r '.isDraft')

          echo "Intento $attempt: state=$state mergeStateStatus=$merge_state reviewDecision=$review_decision isDraft=$is_draft"

          if [ "$state" = "MERGED" ] || [ "$state" = "CLOSED" ]; then
            echo "PR ya cerrada o mergeada, no se requiere accion."
            exit 0
          fi

          if [ "$is_draft" = "true" ]; then
            echo "PR en draft, no se intenta merge automatico."
            exit 0
          fi

          if gh pr merge "$pr_number" \
            --squash \
            -R ${{ github.repository }}; then
            echo "Merge ejecutado correctamente."
            exit 0
          fi

          echo "Merge no disponible todavia, se reintentara."

          if [ "$attempt" -lt 6 ]; then
            sleep 10
          fi
          done

          echo "No se pudo mergear dentro de la ventana de reintentos."
          exit 0
