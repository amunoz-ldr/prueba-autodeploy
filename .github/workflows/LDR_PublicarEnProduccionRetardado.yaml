name: "LDR: Publicar en produccion (retardado)"

on:
    schedule:
        - cron: "0 6 * * 1" # Every Monday at 06:00 UTC - adjust as needed
    workflow_dispatch: # Allow manual triggering

permissions:
    actions: write
    contents: read

defaults:
    run:
        shell: powershell

jobs:
    TriggerPublish:
        runs-on: [windows-latest]
        steps:
            - name: Trigger Publish To Environment workflow
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  $errorActionPreference = "Stop"
                  $headers = @{
                    "Accept"               = "application/vnd.github+json"
                    "Authorization"        = "Bearer $env:GITHUB_TOKEN"
                    "X-GitHub-Api-Version" = "2022-11-28"
                  }
                  $body = @{
                    ref    = "${{ github.ref_name }}"
                    inputs = @{
                      environmentName      = "PROD*"
                      appVersion           = "current"
                      createEnvIfNotExists = "false"
                    }
                  } | ConvertTo-Json -Depth 5

                  $uri = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/PublishToEnvironment.yaml/dispatches"
                  Invoke-RestMethod -Method Post -Uri $uri -Headers $headers -Body $body -ContentType "application/json"
                  Write-Host "Publish To Environment workflow triggered for PROD* environments."
